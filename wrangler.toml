# Cloudflare Workers + Static Assets config for the Lane — POC Validator.
#
# Cloudflare's Git build runs `npx wrangler deploy`, which deploys a WORKER. This file
# makes that succeed: the static front-end (index.html, src/, assets/) is served from
# the [assets] binding, and worker.js routes /api/* to the shared handlers in
# ./functions. Google's Gemma 4 runs on Workers AI via the [ai] binding — no API key.
#
# Files that must NOT be served (worker.js, ./functions, server.js, tests, docs) are
# excluded from the asset upload via .assetsignore.
#
# Local dev:   npx wrangler dev      (Worker + assets; AI runs on real Workers AI)
# Deploy:      npx wrangler deploy    (what the Cloudflare Git build runs)
#
# NOTE: local `node server.js` + Ollama remains a separate, unaffected dev path.

name = "pocai"
main = "worker.js"
compatibility_date = "2026-06-26"

[assets]
directory = "."
binding = "ASSETS"
run_worker_first = ["/api/*"]

# Google Gemma 4 on Cloudflare Workers AI. Used by functions/api/llm.js as env.AI.
[ai]
binding = "AI"
